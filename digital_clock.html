<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        .clock { font-size: 48px; margin: 20px; }
    </style>
</head>
<body>
    <h1>Current Time in Different Time Zones</h1>
    <div class="clock" id="utc">UTC: <span id="utc-time"></span></div>
    <div class="clock" id="est">EST: <span id="est-time"></span></div>
    <div class="clock" id="pst">PST: <span id="pst-time"></span></div>
    <div class="clock" id="cet">CET: <span id="cet-time"></span></div>
    <script>
        function updateClocks() {
            const now = new Date();
            const utc = now.toUTCString();
            document.getElementById('utc-time').innerText = utc.split(' ')[4];
            
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('est-time').innerText = now.toLocaleTimeString('en-US', { timeZone: 'America/New_York', ...options });
            document.getElementById('pst-time').innerText = now.toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', ...options });
            document.getElementById('cet-time').innerText = now.toLocaleTimeString('en-US', { timeZone: 'Europe/Berlin', ...options });
        }
        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
